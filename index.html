<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePaws Login</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Arial; }
  body { background: linear-gradient(135deg, #009688, #004d40); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }

  /* #ANIMATION SA OPENING */
  #splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #009688, #004d40);
    display: flex; justify-content: center; align-items: center; flex-direction: column;
    z-index: 9999; animation: fadeOut 1s ease 2s forwards;
  }
  #splash img { width: 120px; animation: bounce 1s ease infinite; }
  #splash h1 { color: white; margin-top: 10px; font-size: 24px; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  @keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
  }

  .container { 
    background: #1e1e2f; padding: 20px; border-radius: 20px; width: 95%; max-width: 500px; 
    color: white; opacity: 0; animation: fadeIn 1s ease 2.2s forwards; /* #PAPASOK PAGKATAPOS NG SPLASH */
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2c2c3f; color: white; }
  input::placeholder { color: #888; }
  button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
  .btn-login { background: #4dd0e1; color: #000; }
  .btn-signup { background: transparent; border: 1px solid #4dd0e1; color: #4dd0e1; }
  #mapPicker { height: 250px; border-radius: 10px; margin: 10px 0; display: none; }
</style>
</head>
<body>

<!-- #ETO YUNG SPLASH SCREEN SA OPENING -->
<div id="splash">
  <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="paw">
  <h1>SafePaws</h1>
  <p style="color:#b2dfdb;">Clinic & Grooming</p>
</div>

<div class="container">
  <h2>SafePaws Login</h2>

  <div id="signupFields" style="display:none;">
    <input type="text" id="clinicName" placeholder="Clinic Name" required>
    <label style="font-size:14px;">Click map to set Clinic Location:</label>
    <div id="mapPicker"></div>
    <input type="text" id="clinicAddress" placeholder="ex. Bauan, Batangas" readonly>
    <input type="hidden" id="clinicLat">
    <input type="hidden" id="clinicLng">
    <input type="tel" id="clinicContact" placeholder="ex. 09123456789">
  </div>

  <input type="email" id="email" placeholder="ex. clinic@gmail.com" required>
  <input type="password" id="password" placeholder="Password" required>
  
  <button class="btn-login" id="authBtn" onclick="login()">Login</button>
  <button class="btn-signup" id="switchBtn" onclick="toggleAuth()">Don't have an account? Sign Up</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let isLogin = true;
let map, clinicMarker;

function toggleAuth() {
  isLogin = !isLogin;
  let signup = document.getElementById('signupFields');
  signup.style.display = isLogin ? 'none' : 'block';
  document.getElementById('authBtn').innerText = isLogin ? 'Login' : 'Sign Up';
  document.getElementById('switchBtn').innerText = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login";
  if(!isLogin && !map) initMap();
}

function initMap() {
  map = L.map('mapPicker').setView([13.7561, 121.0583], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.on('click', function(e) {
    let lat = e.latlng.lat; let lng = e.latlng.lng;
    document.getElementById('clinicLat').value = lat;
    document.getElementById('clinicLng').value = lng;
    document.getElementById('clinicAddress').value = `Pin: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    if(clinicMarker) map.removeLayer(clinicMarker);
    clinicMarker = L.marker([lat, lng]).addTo(map).bindPopup("Clinic Location").openPopup();
  });
}

function login() {
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;
  if(isLogin) {
    auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = "safepaws_clinic.html")
    .catch((err) => alert("Login Error: " + err.message));
  } else {
    let clinicName = document.getElementById('clinicName').value;
    let clinicAddress = document.getElementById('clinicAddress').value;
    let clinicLat = document.getElementById('clinicLat').value;
    let clinicLng = document.getElementById('clinicLng').value;
    if(!clinicName || !clinicAddress) return alert("Please fill Clinic Name and set location");
    auth.createUserWithEmailAndPassword(email, password)
    .then((cred) => {
      db.collection('clinics').doc(cred.user.uid).set({
        clinicName, clinicAddress, 
        location: {lat: parseFloat(clinicLat), lng: parseFloat(clinicLng)},
        email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        alert("Clinic Account Created!");
        window.location.href = "safepaws_clinic.html";
      });
    }).catch((err) => alert("Signup Error: " + err.message));
  }
}
</script>
</body>
</html>
