<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePaws Clinic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; border-radius: 16px; padding: 24px; }
    #map { height: 200px; background: #0a0f1a; border: 2px dashed #22d3ee; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #map.set { background: #065f46; border: 2px solid #10B981; }
    .hidden { display: none!important; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="card w-full max-w-md">
    <h2 id="formTitle" class="text-2xl font-bold text-[#22d3ee] mb-4 text-center">🏥 Clinic Sign Up</h2>
    
    <!-- INPUTS -->
    <input id="clinicName" type="text" placeholder="Clinic Name" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-2">
    
    <p class="text-sm text-gray-400 mb-1">Click map to set Clinic Location:</p>
    <div id="map" class="mb-2">Click here to set location</div>

    <input id="phone" type="tel" placeholder="Phone Number" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-2">
    <input id="email" type="email" placeholder="Email" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-2">
    <input id="password" type="password" placeholder="Password" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-4">

    <!-- BUTTONS -->
    <button id="signupBtn" class="w-full bg-[#22d3ee] text-black font-bold p-3 rounded-lg mb-2">Sign Up</button>
    <button id="loginBtn" class="w-full bg-gray-600 text-white font-bold p-3 rounded-lg mb-2 hidden">Login</button>
    
    <p id="toggleAuth" class="text-center text-sm text-gray-400 cursor-pointer">Already have an account? Login</p>
    <p id="authError" class="text-red-500 text-sm mt-2 text-center"></p>
    <p id="approvalText" class="text-yellow-400 text-sm mt-2 text-center hidden">Waiting for Admin approval...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    
    const firebaseConfig = { 
      apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
      authDomain: "safepaws-batangas.firebaseapp.com",
      databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "safepaws-batangas",
      storageBucket: "safepaws-batangas.firebasestorage.app",
      messagingSenderId: "629904615191",
      appId: "1:629904615191:web:45f7148d65ba61a867f952" 
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = false;
    let clinicLat = null, clinicLng = null;

    // 1. MAP CLICK - PARA MAWALA YUNG ERROR
    document.getElementById('map').onclick = (e) => {
      // Sample location muna. Bauan Batangas coords
      clinicLat = 13.7910; 
      clinicLng = 121.0045; 
      const map = document.getElementById('map');
      map.classList.add('set');
      map.innerText = "📍 Location Set: Bauan, Batangas";
    }

    // 2. TOGGLE LOGIN/SIGNUP
    document.getElementById('toggleAuth').onclick = () => {
      isLogin = !isLogin;
      document.getElementById('formTitle').innerText = isLogin ? "🏥 Clinic Login" : "🏥 Clinic Sign Up";
      document.getElementById('signupBtn').classList.toggle('hidden');
      document.getElementById('loginBtn').classList.toggle('hidden');
      document.getElementById('clinicName').classList.toggle('hidden');
      document.getElementById('phone').classList.toggle('hidden');
      document.getElementById('map').classList.toggle('hidden');
      document.getElementById('toggleAuth').innerText = isLogin ? "No account? Sign Up" : "Already have an account? Login";
    }

    // 3. SIGNUP
    document.getElementById('signupBtn').onclick = async () => {
      const name = clinicName.value.trim();
      const emailVal = email.value.trim();
      const pass = password.value;
      const phoneVal = phone.value.trim();

      if(!name || !clinicLat) {
        alert("Please fill Clinic Name and set location");
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, emailVal, pass);
        // Save sa Firestore with PENDING status
        await setDoc(doc(db, "clinics", cred.user.uid), {
          name: name,
          email: emailVal,
          phone: phoneVal,
          lat: clinicLat,
          lng: clinicLng,
          status: "pending", // I-aapprove mo to sa Firebase
          createdAt: serverTimestamp()
        });
        document.getElementById('approvalText').classList.remove('hidden');
        alert("Signup successful! Wait for Admin approval in Firebase");
      } catch(err) {
        authError.textContent = err.message;
      }
    }

    // 4. LOGIN
    document.getElementById('loginBtn').onclick = async () => {
      try {
        const cred = await signInWithEmailAndPassword(auth, email.value, password.value);
        const clinicDoc = await getDoc(doc(db, "clinics", cred.user.uid));
        if(clinicDoc.exists() && clinicDoc.data().status === "approved") {
          alert("Login Success! Redirecting...");
          // window.location.href = "clinic-dashboard.html"
        } else {
          document.getElementById('approvalText').classList.remove('hidden');
          alert("Your clinic is not approved yet");
        }
      } catch(err) {
        authError.textContent = err.message;
      }
    }
  </script>
</body>
</html>
