<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"> 
  <title>SafePaws Admin V3.0</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style> 
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:#e5e7eb;overflow:hidden} 
    #splash{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeOut.5s ease 1.5s forwards} 
    #splash div{font-size:100px;animation:pop.8s cubic-bezier(.68,-.55,.265,1.55)} 
    @keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}} 
    @keyframes fadeOut{0%{opacity:1}100%{opacity:0;visibility:hidden}} 
    #loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)} 
    .login-card{background:#1e293b;padding:32px;border-radius:16px;box-shadow:0 8px 24px #0005;width:90%;max-width:380px;border:1px solid #334155} 
    .login-card h1{display:flex;align-items:center;gap:10px;font-size:24px;margin:0 0 20px;justify-content:center} 
    .login-card input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb;font-size:16px} 
    .login-card button{width:100%;padding:14px;margin-top:12px;border:0;border-radius:10px;background:#38bdf8;color:#0f172a;font-weight:bold;font-size:16px;cursor:pointer} 
    #appScreen{display:none} 
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:0} 
    header h1{display:flex;align-items:center;gap:8px;font-size:20px;margin:0} 
    .logout{background:#dc2626;border:0;color:#fff;padding:8px 14px;border-radius:8px;font-weight:bold;cursor:pointer} 
    main{padding:20px;padding-bottom:80px} 
    .card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px} 
    table{width:100%;border-collapse:collapse;font-size:14px} 
    th,td{padding:12px;text-align:left;border-bottom:1px solid #334155} 
    th{color:#94a3b8;font-weight:600;font-size:12px;text-transform:uppercase} 
    .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold} 
    .pending{background:#f59e0b;color:#000}.approved{background:#16a34a}.rejected{background:#dc2626} 
    .btn{padding:8px 12px;border:0;border-radius:8px;font-weight:bold;cursor:pointer;margin-right:6px} 
    .btn-green{background:#16a34a;color:#fff}.btn-red{background:#dc2626;color:#fff} 
    nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex} 
    nav button{flex:1;padding:12px 4px;background:0;border:0;color:#94a3b8;font-size:12px;cursor:pointer} 
    nav button.active{color:#38bdf8;background:#0f172a} 
    .tab{display:none}.tab.active{display:block} 
    .notif-dot{background:#dc2626;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;margin-left:4px;vertical-align:top} 
    #adminMap{height:300px; border-radius:12px; margin-top:12px; z-index:1}
    .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(min-width:768px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
  </style> 
</head> 
<body> 
  <div id="splash"><div>🛡️</div></div> 
  <div id="loginScreen"> 
    <div class="login-card"> 
      <h1>🛡️ SafePaws Admin</h1> 
      <input id="email" type="email" placeholder="Email" value="gabinessheabert@gmail.com"> 
      <input id="pass" type="password" placeholder="Password"> 
      <button onclick="login()">Login</button> 
    </div> 
  </div> 
  <div id="appScreen"> 
    <header> 
      <h1 id="headerTitle">🚚 Drivers</h1> 
      <button class="logout" onclick="logout()">Logout</button> 
    </header> 
    <main> 
      <!-- 1. DRIVERS TAB -->
      <div id="driversTab" class="tab active"> 
        <div class="card"><table><thead><tr><th>Name</th><th>Plate</th><th>Status</th><th>Action</th></tr></thead><tbody id="driversTable"></tbody></table></div> 
      </div> 
      
      <!-- 2. BUSINESS TAB -->
      <div id="businessTab" class="tab"> 
        <div class="card"><table><thead><tr><th>Name</th><th>Type</th><th>License</th><th>Status</th><th>Action</th></tr></thead><tbody id="businessTable"></tbody></table></div> 
      </div> 
      
      <!-- 3. APPROVAL TAB -->
      <div id="approvalTab" class="tab"> 
        <div class="card"> 
          <h3 style="margin-top:0">📝 Pending Applications</h3> 
          <div id="approvalList">Loading...</div> 
          <div id="adminMap"></div>
        </div> 
      </div> 
      
      <!-- 4. EARNINGS TAB - MAY COMMISSION NA TAYO -->
      <div id="earnTab" class="tab"> 
        <div class="card">
          <h3 style="margin-top:0">💰 Earnings Report</h3>
          <div class="stat-grid mb-4">
            <div class="card text-center"><p class="text-gray-400 text-sm">Total Revenue</p><p id="totalRevenue" class="text-2xl font-bold text-green-500">₱0</p></div>
            <div class="card text-center"><p class="text-gray-400 text-sm">Admin 20%</p><p id="adminEarn" class="text-2xl font-bold text-yellow-400">₱0</p></div>
            <div class="card text-center"><p class="text-gray-400 text-sm">Rider 65%</p><p id="riderEarn" class="text-2xl font-bold text-[#38bdf8]">₱0</p></div>
            <div class="card text-center"><p class="text-gray-400 text-sm">Clinic 15%</p><p id="clinicEarn" class="text-2xl font-bold text-[#22d3ee]">₱0</p></div>
          </div>
          <h4 class="font-bold mb-2">Recent Completed Bookings</h4>
          <div style="overflow-x:auto">
            <table><thead><tr><th>Pet</th><th>Type</th><th>Rider</th><th>Clinic</th><th>Fare</th></tr></thead><tbody id="earnTable"></tbody></table>
          </div>
        </div> 
      </div> 
    </main> 
    <nav> 
      <button class="active" onclick="switchTab('driversTab',this,'🚚 Drivers')">🚚<br>Drivers</button> 
      <button onclick="switchTab('businessTab',this,'🏥 Business')">🏥<br>Business</button> 
      <button onclick="switchTab('approvalTab',this,'📝 Approval')"><span style="position:relative">📝<span id="notifBadge" class="notif-dot" style="display:none">0</span></span><br>Approval</button> 
      <button onclick="switchTab('earnTab',this,'💰 Earn')">💰<br>Earn</button>
    </nav> 
  </div> 
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module"> 
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"; 
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"; 
    import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"; 
    
    const firebaseConfig = { 
      apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
      authDomain: "safepaws-batangas.firebaseapp.com",
      databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "safepaws-batangas",
      storageBucket: "safepaws-batangas.firebasestorage.app",
      messagingSenderId: "629904615191",
      appId: "1:629904615191:web:45f7148d65ba61a867f952" 
    }; 
    const app = initializeApp(firebaseConfig); 
    const auth = getAuth(app); 
    const db = getFirestore(app); 

    let adminMap, markers = [];

    onAuthStateChanged(auth,user=>{ 
      if(user){ 
        setTimeout(()=>{document.getElementById('splash').style.display='none';},1600); 
        document.getElementById('loginScreen').style.display='none'; 
        document.getElementById('appScreen').style.display='block'; 
        initAdminMap();
      } else{ 
        document.getElementById('splash').style.display='flex'; 
        document.getElementById('loginScreen').style.display='flex'; 
        document.getElementById('appScreen').style.display='none'; 
      } 
    }); 

    function initAdminMap(){
      adminMap = L.map('adminMap').setView([13.7910, 121.0045], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(adminMap);
    }

    async function login(){ 
      const e=document.getElementById('email').value; 
      const p=document.getElementById('pass').value; 
      try{await signInWithEmailAndPassword(auth,e,p);} 
      catch(err){alert(err.message);} 
    } 
    window.login=login; 
    window.logout=()=>signOut(auth); 
    
    function switchTab(id,btn,title){ 
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
      document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); 
      document.getElementById(id).classList.add('active'); 
      btn.classList.add('active'); 
      document.getElementById('headerTitle').textContent=title; 
      if(id === 'approvalTab'){ setTimeout(()=>adminMap.invalidateSize(), 100) }
    } 
    window.switchTab=switchTab; 
    
    // 1. DRIVERS TAB 
    onSnapshot(collection(db,'riders'),snap=>{ 
      let html=''; 
      snap.forEach(d=>{ 
        const r=d.data(); 
        html+=`<tr><td>${r.name||'-'}</td><td>${r.plate||'-'}</td><td><span class="badge ${r.status}">${r.status}</span></td><td>${r.status==='pending'?`<button class="btn btn-green" onclick="approve('${d.id}','riders')">Approve</button>`:''}</td></tr>`; 
      }); 
      document.getElementById('driversTable').innerHTML=html||'<tr><td colspan=4>No drivers</td></tr>'; 
    }); 
    
    // 2. BUSINESS TAB - VET + GROOM
    onSnapshot(collection(db,'businesses'),snap=>{ 
      let html=''; 
      snap.forEach(d=>{ 
        const b=d.data(); 
        const typeIcon = b.type === 'vet' ? '🩺 Vet' : '✂️ Groomer';
        html+=`<tr>
          <td>${b.name||'-'}</td>
          <td>${typeIcon}</td>
          <td>${b.license||'-'}</td>
          <td><span class="badge ${b.status}">${b.status}</span></td>
          <td>${b.status==='pending'?`<button class="btn btn-green" onclick="approve('${d.id}','businesses')">Approve</button>`:''}</td>
        </tr>`; 
      }); 
      document.getElementById('businessTable').innerHTML=html||'<tr><td colspan=5>No businesses</td></tr>'; 
    }); 
    
    // 3. EARNINGS TAB - 20% ADMIN COMMISSION
    onSnapshot(collection(db,'bookings'),snap=>{
      let total=0, adminEarn = 0, riderEarn = 0, clinicEarn = 0, html='';
      
      snap.forEach(d=>{
        const b=d.data();
        if(b.status === 'Completed'){
          const fare = parseFloat(b.fare?.replace('₱','').replace(',','') || 0);
          total += fare;
          
          // HATI: 20% ADMIN, 65% RIDER, 15% CLINIC
          const adminCut = fare * 0.20; 
          const riderCut = fare * 0.65; 
          const clinicCut = fare * 0.15;
          
          adminEarn += adminCut;
          riderEarn += riderCut;
          clinicEarn += clinicCut;

          html += `<tr>
            <td>${b.petName||'-'}</td>
            <td>${b.type||'-'}</td>
            <td>${b.riderName||'-'}</td>
            <td>${b.clinicName||'-'}</td>
            <td>₱${fare.toFixed(2)}</td>
          </tr>`;
        }
      });

      document.getElementById('totalRevenue').innerText = `₱${total.toFixed(2)}`;
      document.getElementById('adminEarn').innerText = `₱${adminEarn.toFixed(2)}`;
      document.getElementById('riderEarn').innerText = `₱${riderEarn.toFixed(2)}`;
      document.getElementById('clinicEarn').innerText = `₱${clinicEarn.toFixed(2)}`;
      document.getElementById('earnTable').innerHTML = html || '<tr><td colspan=5>No completed bookings</td></tr>';
    });

    // 4. APPROVAL TAB + LEAFLET MAP
    async function loadApproval(){ 
      let html=''; 
      let count=0; 
      markers.forEach(m => adminMap.removeLayer(m));
      markers = [];

      const cols=[{col:'riders',icon:'🚚'},{col:'businesses',icon:'🏥'}]; 
      for(const {col,icon} of cols){ 
        const snap=await getDocs(query(collection(db,col), where("status","==","pending"))); 
        count+=snap.size; 
        snap.forEach(d=>{ 
          const u=d.data(); 
          const businessType = u.type === 'vet' ? '🩺 Vet Clinic' : u.type === 'groomer' ? '✂️ Grooming Salon' : '🚚 Rider'; 
          html+=`<div class="card">${icon} <b>${u.name}</b> - ${u.email}<br>
          <small>${businessType} | ${u.phone||''}</small><br><br>
          <button class="btn btn-green" onclick="approve('${d.id}','${col}')">✅ Approve</button>
          <button class="btn btn-red" onclick="reject('${d.id}','${col}')">❌ Reject</button></div>`; 

          if(u.lat && u.lng){
            const marker = L.marker([u.lat, u.lng]).addTo(adminMap)
              .bindPopup(`<b>${u.name}</b><br>${businessType}`);
            markers.push(marker);
          }
        }); 
      } 
      document.getElementById('approvalList').innerHTML=html||'No pending applications'; 
      const badge=document.getElementById('notifBadge'); 
      badge.style.display=count>0?'inline':'none'; 
      badge.textContent=count; 
    } 
    setInterval(loadApproval,3000); 
    loadApproval(); 
    
    window.approve=async(id,col)=>{ 
      await updateDoc(doc(db,col,id),{status:'approved'}); 
      loadApproval(); 
    } 
    window.reject=async(id,col)=>{ 
      await updateDoc(doc(db,col,id),{status:'rejected'}); 
      loadApproval(); 
    } 
  </script> 
</body> 
</html>
